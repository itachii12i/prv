<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#6D28D9">
    <title>المنتجات | LodeaLode.dz</title>
    <meta name="description" content="تصفح جميع منتجات الشراء الجماعي بأسعار المصنع - LodeaLode.dz">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>

    <style>
        /* ══════════════════════════════
           VARIABLES & RESET
        ══════════════════════════════ */
        :root {
            --bg:           #F8F9FA;
            --card-bg:      #FFFFFF;
            --text:         #1E1B4B;
            --text-muted:   #6B7280;
            --primary:      #6D28D9;
            --primary-dark: #4C1D95;
            --primary-light:#8B5CF6;
            --border:       #E5E7EB;
            --input-bg:     #F3F4F6;
            --danger:       #EF4444;
            --success:      #10B981;
            --gold:         #F59E0B;
        }
        body.dark-mode {
            --bg:        #0F0A1E;
            --card-bg:   #1A1133;
            --text:      #F1F5F9;
            --text-muted:#94A3B8;
            --border:    rgba(255,255,255,0.08);
            --input-bg:  #1F163D;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo',sans-serif; }
        html, body { overflow-x: hidden; width: 100%; }
        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 100px;
            transition: background .3s, color .3s;
            -webkit-tap-highlight-color: transparent;
        }

        /* ══════════════════════════════
           HEADER
        ══════════════════════════════ */
        .top-header {
            position: sticky;
            top: 0;
            z-index: 200;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: background .3s;
        }
        .header-logo {
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        .header-logo img { height: 24px; object-fit: contain; }
        .header-logo span { font-size: .95rem; font-weight: 900; color: var(--primary); }
        .header-actions { display: flex; align-items: center; gap: 8px; }
        .icon-btn {
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            border: none; cursor: pointer;
            background: rgba(109,40,217,0.08);
            color: var(--primary);
            font-size: 1rem;
            transition: background .2s, transform .15s;
            flex-shrink: 0;
        }
        .icon-btn:hover { background: rgba(109,40,217,0.15); }
        .icon-btn:active { transform: scale(.93); }

        /* ══════════════════════════════
           PAGE TITLE
        ══════════════════════════════ */
        .page-title-bar {
            padding: 16px 16px 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .page-title-bar h1 {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--text);
        }
        .count-badge {
            background: rgba(109,40,217,0.1);
            color: var(--primary);
            font-size: .75rem;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }

        /* ══════════════════════════════
           SEARCH
        ══════════════════════════════ */
        .search-bar {
            padding: 10px 16px;
            display: flex;
            gap: 8px;
        }
        .search-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--input-bg);
            border-radius: 12px;
            padding: 0 12px;
            border: 1.5px solid transparent;
            transition: border-color .2s;
            min-width: 0;
        }
        .search-wrap:focus-within { border-color: var(--primary); }
        .search-wrap i { color: var(--text-muted); font-size: .9rem; flex-shrink: 0; }
        .search-wrap input {
            border: none;
            background: transparent;
            flex: 1;
            padding: 10px 0;
            font-size: .9rem;
            color: var(--text);
            outline: none;
            font-family: 'Cairo', sans-serif;
            min-width: 0;
        }
        .search-wrap input::placeholder { color: var(--text-muted); }
        .filter-btn {
            width: 44px; height: 44px;
            border-radius: 12px;
            border: none; cursor: pointer;
            background: rgba(109,40,217,0.1);
            color: var(--primary);
            font-size: 1rem;
            display: flex; align-items: center; justify-content: center;
            transition: background .2s, transform .15s;
            flex-shrink: 0;
        }
        .filter-btn:active { background: rgba(109,40,217,0.2); transform: scale(.93); }
        .filter-btn.active { background: var(--primary); color: white; }

        /* ══════════════════════════════
           CATEGORY TABS
        ══════════════════════════════ */
        .cat-tabs {
            display: flex;
            gap: 8px;
            padding: 0 16px 14px;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .cat-tabs::-webkit-scrollbar { display: none; }
        .cat-tab {
            padding: 7px 14px;
            border-radius: 20px;
            font-size: .8rem;
            font-weight: 700;
            white-space: nowrap;
            cursor: pointer;
            border: 1.5px solid var(--border);
            background: var(--card-bg);
            color: var(--text-muted);
            transition: all .2s;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .cat-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* ══════════════════════════════
           PRODUCTS GRID
        ══════════════════════════════ */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 12px;
        }
        @media (min-width: 480px) {
            .products-grid { gap: 14px; padding: 0 16px; }
        }
        @media (min-width: 600px) {
            .products-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (min-width: 900px) {
            .products-grid { grid-template-columns: repeat(4, 1fr); gap: 18px; padding: 0 20px; }
        }

        /* ══════════════════════════════
           PRODUCT CARD
        ══════════════════════════════ */
        .prod-card {
            background: var(--card-bg);
            border-radius: 14px;
            border: 1.5px solid var(--border);
            overflow: hidden;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            transition: transform .25s ease, box-shadow .25s ease, border-color .25s;
            animation: fadeInUp .4s ease both;
            /* prevent overflow on small screens */
            min-width: 0;
            width: 100%;
        }
        .prod-card:active { transform: scale(.97); box-shadow: 0 4px 12px rgba(109,40,217,0.1); }
        @media (hover: hover) {
            .prod-card:hover {
                transform: translateY(-4px);
                box-shadow: 0 12px 30px rgba(109,40,217,0.12);
                border-color: rgba(109,40,217,0.25);
            }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .prod-img-wrap {
            position: relative;
            height: 120px;
            background: var(--input-bg);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            padding: 8px;
        }
        .prod-img-wrap img {
            max-height: 100px;
            max-width: 100%;
            width: auto;
            object-fit: contain;
            transition: transform .3s ease;
            mix-blend-mode: multiply;
        }
        body.dark-mode .prod-img-wrap img { mix-blend-mode: normal; }

        .disc-badge {
            position: absolute;
            top: 6px; right: 6px;
            background: var(--danger);
            color: white;
            font-size: .65rem;
            font-weight: 900;
            padding: 2px 7px;
            border-radius: 8px;
            z-index: 2;
        }
        .fav-btn {
            position: absolute;
            top: 6px; left: 6px;
            width: 28px; height: 28px;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: .9rem;
            color: #D1D5DB;
            transition: color .2s, background .2s;
            z-index: 2;
        }
        .fav-btn.active { color: #EF4444; }

        .prod-body {
            padding: 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .prod-cat-tag {
            font-size: .65rem;
            font-weight: 800;
            color: var(--primary);
            background: rgba(109,40,217,0.08);
            padding: 2px 7px;
            border-radius: 7px;
            display: inline-block;
            align-self: flex-start;
        }
        .prod-name {
            font-size: .82rem;
            font-weight: 800;
            color: var(--text);
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .prod-buyers {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: .68rem;
            font-weight: 700;
            color: var(--text-muted);
        }
        .prod-buyers i { color: var(--success); font-size: .65rem; }
        .prod-progress {
            height: 4px;
            background: var(--border);
            border-radius: 10px;
            overflow: hidden;
        }
        .prod-progress-fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, var(--success), #34D399);
            transition: width .5s ease;
        }
        .prod-price-row {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-top: 2px;
        }
        .prod-price {
            font-size: .95rem;
            font-weight: 900;
            color: var(--primary-dark);
            line-height: 1;
        }
        .prod-price small { font-size: .7rem; font-weight: 700; }
        .prod-old-price {
            font-size: .68rem;
            font-weight: 600;
            color: var(--text-muted);
            text-decoration: line-through;
        }
        .view-btn {
            width: 100%;
            padding: 8px 4px;
            background: var(--primary);
            border: none;
            color: white;
            border-radius: 9px;
            font-weight: 800;
            font-size: .78rem;
            cursor: pointer;
            margin-top: 6px;
            font-family: 'Cairo', sans-serif;
            transition: background .2s, transform .15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .view-btn:active { transform: scale(.97); background: var(--primary-dark); }

        /* ══════════════════════════════
           CATEGORY SECTIONS (all tab)
        ══════════════════════════════ */
        .categories-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .cat-section { padding: 0 12px; }
        .cat-section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .cat-section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: .95rem;
            font-weight: 900;
            color: var(--text);
        }
        .cat-section-icon {
            width: 30px; height: 30px;
            border-radius: 9px;
            background: rgba(109,40,217,0.1);
            display: flex; align-items: center; justify-content: center;
            color: var(--primary);
            font-size: .9rem;
            flex-shrink: 0;
        }
        .view-all-link {
            font-size: .72rem;
            font-weight: 800;
            color: var(--primary);
            cursor: pointer;
            background: rgba(109,40,217,0.08);
            padding: 4px 10px;
            border-radius: 20px;
            border: none;
            font-family: 'Cairo', sans-serif;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .cat-scroll {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding: 4px 2px 10px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .cat-scroll::-webkit-scrollbar { display: none; }
        .cat-scroll .prod-card {
            flex: 0 0 155px;
            min-width: 155px;
        }

        @media (min-width: 768px) {
            .cat-scroll {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 16px;
                overflow-x: visible;
            }
            .cat-scroll .prod-card {
                flex: auto;
                min-width: 0;
            }
            body { background: #E5E7EB; }
            .app-wrapper {
                max-width: 1200px;
                margin: 0 auto;
                background: var(--bg);
                min-height: 100vh;
                box-shadow: 0 10px 50px rgba(0,0,0,0.05);
                position: relative;
            }
            .mobile-bottom-nav {
                position: fixed !important;
                bottom: 20px !important;
                left: 50% !important;
                right: auto !important;
                transform: translateX(-50%) !important;
                width: calc(100% - 40px) !important;
                max-width: 500px !important;
                border-radius: 30px !important;
                z-index: 1000 !important;
            }
        }

        /* ══════════════════════════════
           SKELETON LOADING
        ══════════════════════════════ */
        .skel-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            padding: 0 16px;
        }
        @media (min-width: 700px) { .skel-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .skel-grid { grid-template-columns: repeat(4, 1fr); } }
        .skel-card {
            background: var(--card-bg);
            border-radius: 18px;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .skel {
            background: linear-gradient(90deg, var(--border) 25%, var(--input-bg) 50%, var(--border) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 6px;
        }
        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ══════════════════════════════
           EMPTY / ERROR STATE
        ══════════════════════════════ */
        .state-box {
            text-align: center;
            padding: 60px 20px;
            grid-column: 1 / -1;
        }
        .state-box .state-icon {
            font-size: 3.5rem;
            margin-bottom: 16px;
            display: block;
        }
        .state-box h3 { font-size: 1.15rem; font-weight: 800; margin-bottom: 8px; }
        .state-box p  { font-size: .9rem; color: var(--text-muted); }

        /* ══════════════════════════════
           BOTTOM NAV
        ══════════════════════════════ */
        .mobile-bottom-nav {
            position: fixed;
            bottom: 8px; left: 10px; right: 10px;
            background: rgba(42,24,80,.96);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(155,111,212,.3);
            border-radius: 22px;
            padding: 6px 8px;
            box-shadow: 0 12px 40px rgba(46,28,82,.45);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 99999;
            /* safe area for notch phones */
            padding-bottom: calc(6px + env(safe-area-inset-bottom));
        }
        .mobile-bottom-nav .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 7px 2px;
            border-radius: 14px;
            text-decoration: none;
            color: #9CA3AF;
            transition: all .25s;
            gap: 2px;
            min-height: 46px;
            -webkit-tap-highlight-color: transparent;
        }
        .mobile-bottom-nav .nav-item.active {
            color: #A78BFA;
            background: rgba(109,40,217,.18);
        }
        .mobile-bottom-nav .nav-item:active { transform: scale(.92); }
        .mobile-bottom-nav .nav-icon { font-size: 1.2rem; }
        .mobile-bottom-nav .nav-label { font-size: .58rem; font-weight: 800; }

        /* ══════════════════════════════
           HIDDEN HELPER
        ══════════════════════════════ */
        .hidden { display: none !important; }

        /* ══════════════════════════════
           DARK MODE CARD OVERRIDES
        ══════════════════════════════ */
        body.dark-mode .prod-img-wrap { background: rgba(255,255,255,0.04); }
        body.dark-mode .fav-btn { background: rgba(30,20,60,0.9); color: #6B7280; }
    </style>
</head>
<body>
    <div class="app-wrapper">
    <script>
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
    </script>

    <!-- ── HEADER ── -->
    <header class="top-header">
        <a href="index.html" class="header-logo">
            <img src="logo.png" alt="LodeaLode" onerror="this.style.display='none'">
            <span>LodeaLode</span>
        </a>
        <div class="header-actions">
            <button class="icon-btn" id="theme-toggle-btn" title="تغيير المظهر">
                <i id="theme-icon" class="fas fa-moon"></i>
            </button>
            <button class="icon-btn" onclick="history.back()" title="رجوع">
                <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </header>

    <!-- ── PAGE TITLE ── -->
    <div class="page-title-bar">
        <h1>المنتجات</h1>
        <span class="count-badge" id="products-count">جاري التحميل...</span>
    </div>

    <!-- ── SEARCH ── -->
    <div class="search-bar">
        <div class="search-wrap">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" placeholder="ابحث عن منتج أو علامة تجارية...">
        </div>
        <button class="filter-btn" id="filter-btn" title="تصفية">
            <i class="fas fa-sliders-h"></i>
        </button>
    </div>

    <!-- ── CATEGORY TABS ── -->
    <div class="cat-tabs" id="cat-tabs">
        <div class="cat-tab active" data-cat="all">الكل</div>
    </div>

    <!-- ── PRODUCTS CONTAINER ── -->
    <div id="products-container">
        <!-- Skeleton -->
        <div class="skel-grid" id="skeleton-grid">
            <!-- 6 skeleton cards -->
            <div class="skel-card"><div class="skel" style="height:150px;border-radius:0;"></div><div style="padding:12px;display:flex;flex-direction:column;gap:8px;"><div class="skel" style="height:10px;width:40%;"></div><div class="skel" style="height:14px;width:85%;"></div><div class="skel" style="height:14px;width:65%;"></div><div class="skel" style="height:18px;width:50%;"></div><div class="skel" style="height:34px;border-radius:10px;"></div></div></div>
            <div class="skel-card"><div class="skel" style="height:150px;border-radius:0;"></div><div style="padding:12px;display:flex;flex-direction:column;gap:8px;"><div class="skel" style="height:10px;width:40%;"></div><div class="skel" style="height:14px;width:85%;"></div><div class="skel" style="height:14px;width:65%;"></div><div class="skel" style="height:18px;width:50%;"></div><div class="skel" style="height:34px;border-radius:10px;"></div></div></div>
            <div class="skel-card"><div class="skel" style="height:150px;border-radius:0;"></div><div style="padding:12px;display:flex;flex-direction:column;gap:8px;"><div class="skel" style="height:10px;width:40%;"></div><div class="skel" style="height:14px;width:85%;"></div><div class="skel" style="height:14px;width:65%;"></div><div class="skel" style="height:18px;width:50%;"></div><div class="skel" style="height:34px;border-radius:10px;"></div></div></div>
            <div class="skel-card"><div class="skel" style="height:150px;border-radius:0;"></div><div style="padding:12px;display:flex;flex-direction:column;gap:8px;"><div class="skel" style="height:10px;width:40%;"></div><div class="skel" style="height:14px;width:85%;"></div><div class="skel" style="height:14px;width:65%;"></div><div class="skel" style="height:18px;width:50%;"></div><div class="skel" style="height:34px;border-radius:10px;"></div></div></div>
        </div>
        <!-- Real cards injected here -->
        <div id="cards-area"></div>
    </div>

    <!-- ── BOTTOM NAV ── -->
    <nav class="mobile-bottom-nav">
        <a href="index.html"     class="nav-item" id="nav-home">      <i class="fas fa-home nav-icon"></i>         <span class="nav-label">الرئيسية</span></a>
        <a href="rooms.html"     class="nav-item" id="nav-rooms">     <i class="fas fa-shopping-cart nav-icon"></i> <span class="nav-label">غرفي</span></a>
        <a href="community.html" class="nav-item" id="nav-community"> <i class="fas fa-comments nav-icon"></i>      <span class="nav-label">المجتمع</span></a>
        <a href="products.html"  class="nav-item active" id="nav-products"><i class="fas fa-box-open nav-icon"></i><span class="nav-label">المنتجات</span></a>
        <a href="settings.html"  class="nav-item" id="nav-settings">  <i class="far fa-user nav-icon"></i>          <span class="nav-label">حسابي</span></a>
    </nav>

    <script>
    /* ═══════════════════════════════════════════
       STATE
    ═══════════════════════════════════════════ */
    let allProducts   = [];
    let activeCategory = 'all';
    let searchQuery    = '';

    const SUPABASE_URL = window.LodeaAuth?.SUPABASE_URL || 'https://xhjyszxrnkqolrynsffi.supabase.co';
    const SUPABASE_KEY = window.LodeaAuth?.SUPABASE_ANON_KEY || 'sb_publishable_vIx5AuAzJ_4BkFOx1E0gyg_Xf0B0e5C';
    const sb = window.supabase?.createClient(SUPABASE_URL, SUPABASE_KEY);

    /* ═══════════════════════════════════════════
       MOCK DATA FALLBACK
    ═══════════════════════════════════════════ */
    function getMockProducts() {
        // No fake data - only real products from Supabase
        return [];
    }

    /* ═══════════════════════════════════════════
       CARD HTML GENERATOR
    ═══════════════════════════════════════════ */
    function makeCard(p) {
        const price       = p.price || p.wholesale_price || 0;
        const marketPrice = p.market_price || Math.round(price * 1.35);
        const disc        = (marketPrice > price && price > 0) ? Math.round((marketPrice - price) / marketPrice * 100) : 0;
        const buyers      = p.buyers_count || 0;
        const target      = p.target_buyers || 100;
        const pct         = Math.min(Math.round((buyers / target) * 100), 100);
        const img         = p.image_url || '';
        const cat         = p.category || 'عام';

        return `
        <div class="prod-card" onclick="goToProduct('${p.id}')" data-id="${p.id}" data-cat="${cat}">
            <div class="prod-img-wrap">
                ${disc > 0 ? `<span class="disc-badge">-${disc}%</span>` : ''}
                <button class="fav-btn" onclick="toggleFav(event,this)" aria-label="مفضلة">
                    <i class="far fa-heart"></i>
                </button>
                ${img
                    ? `<img src="${img}" alt="${p.name}" loading="lazy" onerror="this.style.display='none'">`
                    : `<i class="fas fa-box" style="font-size:3rem;color:rgba(109,40,217,0.3);"></i>`
                }
            </div>
            <div class="prod-body">
                <span class="prod-cat-tag">${cat}</span>
                <div class="prod-name">${p.name}</div>
                <div class="prod-buyers">
                    <i class="fas fa-users"></i>
                    <span>${buyers.toLocaleString()} / ${target.toLocaleString()} مشترك</span>
                </div>
                <div class="prod-progress">
                    <div class="prod-progress-fill" style="width:${pct}%"></div>
                </div>
                <div class="prod-price-row">
                    <div>
                        <div class="prod-price">${Number(price).toLocaleString()} <small>دج</small></div>
                        ${disc > 0 ? `<div class="prod-old-price">${Number(marketPrice).toLocaleString()} دج</div>` : ''}
                    </div>
                </div>
                <button class="view-btn" onclick="event.stopPropagation(); goToProduct('${p.id}')">
                    <i class="fas fa-eye"></i> عرض الصفقة
                </button>
            </div>
        </div>`;
    }

    /* ═══════════════════════════════════════════
       RENDER
    ═══════════════════════════════════════════ */
    const ICON_MAP = {
        'تكنولوجيا':'fa-laptop','حواسيب':'fa-laptop','هواتف':'fa-mobile-screen',
        'الأدوات الكهرومنزلية':'fa-blender','كهرومنزلية':'fa-blender','منزلية':'fa-blender',
        'ملابس':'fa-shirt','رياضة':'fa-dumbbell','عام':'fa-layer-group'
    };
    function iconFor(cat) {
        for (const [k, v] of Object.entries(ICON_MAP)) {
            if (cat.includes(k)) return v;
        }
        return 'fa-layer-group';
    }

    function render(products) {
        const area = document.getElementById('cards-area');

        if (!products.length) {
            area.innerHTML = `
            <div class="products-grid">
                <div class="state-box">
                    <span class="state-icon">📦</span>
                    <h3>لا توجد منتجات متاحة حالياً</h3>
                    <p>سيتم إضافة صفقات جديدة قريباً. تابعنا!</p>
                </div>
            </div>`;
            document.getElementById('products-count').textContent = '0 منتج';
            return;
        }

        document.getElementById('products-count').textContent = `${products.length} منتج`;

        // When showing all without search → group by category
        if (activeCategory === 'all' && !searchQuery) {
            const byGroup = {};
            products.forEach(p => {
                const g = p.category || 'عام';
                (byGroup[g] = byGroup[g] || []).push(p);
            });

            let html = '<div class="categories-container">';
            for (const [cat, items] of Object.entries(byGroup)) {
                html += `
                <div class="cat-section">
                    <div class="cat-section-header">
                        <div class="cat-section-title">
                            <div class="cat-section-icon"><i class="fas ${iconFor(cat)}"></i></div>
                            فئة ${cat}
                        </div>
                        <button class="view-all-link" onclick="selectCategory('${cat}')">
                            عرض الكل <i class="fas fa-chevron-left" style="font-size:.6rem;"></i>
                        </button>
                    </div>
                    <div class="cat-scroll">
                        ${items.map(p => makeCard(p)).join('')}
                    </div>
                </div>`;
            }
            html += '</div>';
            area.innerHTML = html;
        } else {
            // Grid view
            area.innerHTML = `<div class="products-grid">${products.map(p => makeCard(p)).join('')}</div>`;
        }
    }

    /* ═══════════════════════════════════════════
       FILTER + SEARCH
    ═══════════════════════════════════════════ */
    function applyFilters() {
        let filtered = [...allProducts];
        if (activeCategory !== 'all') {
            filtered = filtered.filter(p => (p.category || '') === activeCategory);
        }
        if (searchQuery) {
            filtered = filtered.filter(p =>
                p.name.toLowerCase().includes(searchQuery) ||
                (p.category || '').toLowerCase().includes(searchQuery)
            );
        }
        render(filtered);
    }

    function buildTabs(products) {
        const cats = [...new Set(products.map(p => p.category).filter(Boolean))];
        const tabsEl = document.getElementById('cat-tabs');
        const allTab = tabsEl.querySelector('[data-cat="all"]');
        tabsEl.innerHTML = '';
        tabsEl.appendChild(allTab);
        cats.forEach(cat => {
            const tab = document.createElement('div');
            tab.className = 'cat-tab';
            tab.dataset.cat = cat;
            tab.textContent = cat;
            tabsEl.appendChild(tab);
        });
        tabsEl.querySelectorAll('.cat-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                tabsEl.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                activeCategory = tab.dataset.cat;
                applyFilters();
            });
        });
    }

    window.selectCategory = function(cat) {
        activeCategory = cat;
        document.querySelectorAll('.cat-tab').forEach(t => {
            t.classList.toggle('active', t.dataset.cat === cat);
        });
        applyFilters();
    };

    /* ═══════════════════════════════════════════
       NAVIGATION
    ═══════════════════════════════════════════ */
    window.goToProduct = function(id) {
        const product = allProducts.find(p => String(p.id) === String(id));
        if (product) {
            try { sessionStorage.setItem('lodea_product_preview', JSON.stringify(product)); } catch {}
        }
        window.location.href = `product.html?id=${encodeURIComponent(id)}`;
    };

    /* ═══════════════════════════════════════════
       FAV TOGGLE
    ═══════════════════════════════════════════ */
    window.toggleFav = function(e, btn) {
        e.stopPropagation();
        btn.classList.toggle('active');
        const icon = btn.querySelector('i');
        icon.classList.toggle('far');
        icon.classList.toggle('fas');
    };

    /* ═══════════════════════════════════════════
       LOAD PRODUCTS
    ═══════════════════════════════════════════ */
    async function loadProducts() {
        // Clear cached mock data that may have been saved previously
        try {
            const cached = localStorage.getItem('products_cache');
            if (cached) {
                const data = JSON.parse(cached);
                // If all IDs start with 'mock-', it's fake data - remove it
                if (data.length && data.every(p => String(p.id).startsWith('mock-'))) {
                    localStorage.removeItem('products_cache');
                }
            }
        } catch {}

        // Try cache first for instant display
        try {
            const cached = localStorage.getItem('products_cache');
            if (cached) {
                const data = JSON.parse(cached);
                if (data.length) {
                    allProducts = data;
                    buildTabs(data);
                    render(data);
                    document.getElementById('skeleton-grid').classList.add('hidden');
                }
            }
        } catch {}

        // Fetch fresh from Supabase
        if (sb) {
            try {
                const { data, error } = await sb.from('products').select('*').order('created_at', { ascending: false });
                if (!error && data && data.length) {
                    allProducts = data;
                    try { localStorage.setItem('products_cache', JSON.stringify(data)); } catch {}
                    buildTabs(data);
                    render(data);
                    document.getElementById('skeleton-grid').classList.add('hidden');
                    return;
                }
            } catch {}
        }

        // No data available
        if (!allProducts.length) {
            allProducts = [];
            buildTabs([]);
            render([]);
            document.getElementById('skeleton-grid').classList.add('hidden');
        }
    }

    /* ═══════════════════════════════════════════
       SEARCH INPUT
    ═══════════════════════════════════════════ */
    document.getElementById('search-input').addEventListener('input', function() {
        searchQuery = this.value.toLowerCase().trim();
        applyFilters();
    });

    /* ═══════════════════════════════════════════
       THEME TOGGLE
    ═══════════════════════════════════════════ */
    (function initTheme() {
        const isDark = localStorage.getItem('theme') === 'dark';
        const icon = document.getElementById('theme-icon');
        if (icon) {
            icon.classList.toggle('fa-sun', isDark);
            icon.classList.toggle('fa-moon', !isDark);
        }
        document.getElementById('theme-toggle-btn').addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const now = document.body.classList.contains('dark-mode');
            const ic = document.getElementById('theme-icon');
            if (ic) { ic.classList.toggle('fa-sun', now); ic.classList.toggle('fa-moon', !now); }
            localStorage.setItem('theme', now ? 'dark' : 'light');
        });
    })();

    /* ═══════════════════════════════════════════
       INIT
    ═══════════════════════════════════════════ */
    loadProducts();
    </script>
    </div>
</body>
</html>

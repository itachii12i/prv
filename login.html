<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسجيل الدخول | LodeaLode</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="mobile.css">
    
    <style>
        :root {
            /* Light Mode Exact Colors */
            --bg-color: #F0F2F5;
            --right-bg: #EAEBF0;
            --text-primary: #1E1B4B;
            --text-secondary: #6B7280;
            --primary-color: #6D28D9; /* Purple */
            --primary-hover: #5B21B6;
            --input-bg: #FFFFFF;
            --input-border: #E5E7EB;
            --icon-color: #9CA3AF;
            --divider-color: #D1D5DB;
            --social-bg: #FFFFFF;
            --social-shadow: 0 4px 15px rgba(0,0,0,0.05);
            --feature-bg: #FFFFFF;
            --link-color: #4F46E5;
        }

        body.dark-mode {
            /* Dark Mode Exact Colors */
            --bg-color: #120A27;
            --right-bg: #150B2D;
            --text-primary: #FFFFFF;
            --text-secondary: #9CA3AF;
            --primary-color: #6D28D9;
            --primary-hover: #5B21B6;
            --input-bg: transparent;
            --input-border: rgba(255, 255, 255, 0.15);
            --icon-color: #6B7280;
            --divider-color: rgba(255, 255, 255, 0.1);
            --social-bg: rgba(255, 255, 255, 0.05);
            --social-shadow: none;
            --feature-bg: rgba(255, 255, 255, 0.05);
            --link-color: #10B981; /* Aqua/Greenish for dark mode link */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }

        /* --- Layout --- */
        .split-layout {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        /* --- Left Side (Form) --- */
        .form-side {
            flex: 0 0 450px;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            position: relative;
            z-index: 10;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 10;
        }

        .logo {
            margin-top: 20px;
            margin-bottom: 50px;
            display: flex;
            justify-content: center;
        }

        .logo img {
            height: 45px;
            object-fit: contain;
        }

        .form-container {
            width: 100%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .titles {
            text-align: center;
            margin-bottom: 40px;
            width: 100%;
        }

        .titles h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .titles p {
            font-size: 0.95rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .form-group {
            width: 100%;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text-primary);
            text-align: right;
            padding-right: 5px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-wrapper input {
            width: 100%;
            padding: 15px 45px;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 30px; /* Pill shape */
            color: var(--text-primary);
            font-size: 0.95rem;
            text-align: center; /* Center the text as in the design */
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: var(--primary-color);
        }

        .icon-right {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--icon-color);
            font-size: 1.1rem;
        }

        .icon-left {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--icon-color);
            font-size: 1.1rem;
            cursor: pointer;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: -5px;
            margin-bottom: 25px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember-me input {
            width: 16px;
            height: 16px;
            accent-color: var(--primary-color);
        }

        .remember-me span {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .forgot-password {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--link-color);
            text-decoration: none;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            border-radius: 30px; /* Pill shape */
            background-color: var(--primary-color);
            color: white;
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(109, 40, 217, 0.3);
            margin-bottom: 30px;
        }

        .divider {
            width: 100%;
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 30px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--divider-color);
        }

        .divider span {
            padding: 0 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .social-login {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            width: 100%;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: var(--social-bg);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--social-shadow);
        }

        .social-btn img {
            width: 20px;
            height: 20px;
        }

        .social-btn i {
            font-size: 1.3rem;
        }

        .social-btn .fa-apple { color: var(--text-primary); }
        .social-btn .fa-facebook-f { color: #1877F2; }

        .signup-link {
            margin-top: auto;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .signup-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 800;
            margin-right: 5px;
        }
        
        .dark-mode .signup-link a {
            color: var(--link-color);
        }

        /* --- Right Side (Illustration) --- */
        .image-side {
            flex: 1;
            background-color: var(--right-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 40px;
        }

        .dark-mode .image-side {
            background: linear-gradient(180deg, #1A0D3E 0%, #110926 100%);
        }

        .illustration-img {
            width: 100%;
            max-width: 600px;
            height: auto;
            object-fit: contain;
            margin-bottom: 40px;
        }

        .features {
            display: flex;
            gap: 20px;
            justify-content: center;
            width: 100%;
            max-width: 600px;
        }

        .feature-item {
            flex: 1;
            background-color: var(--feature-bg);
            padding: 20px 10px;
            border-radius: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* Light mode boxes have light gray/white mix */
        .feature-item {
            background-color: #FFFFFF;
            box-shadow: 0 5px 20px rgba(0,0,0,0.03);
        }
        
        .dark-mode .feature-item {
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: none;
        }

        .feature-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            font-size: 1.2rem;
            color: white;
            background-color: var(--primary-color);
        }

        /* Customizing the 3 icons exactly like the image */
        .f1 { background-color: #6D28D9; } /* Purple */
        .f2 { background-color: #10B981; } /* Green/Aqua */
        .f3 { background-color: #6D28D9; } /* Purple */

        .feature-item h4 {
            font-size: 0.95rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 5px;
        }

        .feature-item p {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* --- Mobile Optimization: Full Desktop Feel --- */
        @media (max-width: 900px) {
            body {
                padding-bottom: 0;
            }
            .split-layout {
                flex-direction: column;
            }
            .form-side {
                flex: none;
                width: 100%;
                padding: 40px 20px 30px;
                order: 1;
            }
            .image-side {
                display: flex !important;
                flex: none;
                width: 100%;
                padding: 30px 20px 40px;
                order: 2;
                border-radius: 0;
                min-height: auto;
            }
            .illustration-img {
                max-width: 340px;
                margin-bottom: 24px;
            }
            .features {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 12px;
                max-width: 100%;
            }
            .feature-item {
                flex: 1;
                min-width: 90px;
                padding: 14px 8px;
            }
            .feature-icon {
                width: 38px;
                height: 38px;
                font-size: 1rem;
                margin-bottom: 10px;
            }
            .feature-item h4 { font-size: 0.82rem; }
            .feature-item p { font-size: 0.72rem; }
        }

        @media (max-width: 480px) {
            .form-side {
                padding: 32px 16px 24px;
            }
            .titles h1 {
                font-size: 1.8rem;
            }
            .illustration-img {
                max-width: 260px;
            }
            .features {
                gap: 8px;
            }
            .feature-item {
                min-width: 80px;
                padding: 12px 6px;
            }
        }

        /* ── إخفاء الشريط السفلي في صفحة تسجيل الدخول تماماً ── */
        .mobile-bottom-nav,
        #mobile-bottom-nav {
            display: none !important;
        }

        /* إعادة ضبط padding للجسم لأنه لا يوجد nav سفلي */
        body {
            padding-bottom: 0 !important;
        }
    </style>
</head>
<body>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>

    <div class="split-layout">
        
        <!-- Left Side: Form -->
        <div class="form-side">
            <button class="theme-toggle" id="theme-toggle-btn">
                <i class="fas fa-moon" id="theme-icon"></i>
            </button>

            <div class="logo">
                <img src="logo.png" alt="LodeaLode Logo" onerror="this.src='https://via.placeholder.com/150x40?text=LodeaLode'">
            </div>

            <div class="form-container">
                <div class="titles">
                    <h1>تسجيل الدخول</h1>
                    <p>أهلاً بك من جديد! سجل دخولك لمتابعة</p>
                </div>

                <form id="login-form" style="width: 100%;">
                    <div class="form-group">
                        <label>البريد الإلكتروني</label>
                        <div class="input-wrapper">
                            <i class="far fa-envelope icon-right"></i>
                            <input type="email" placeholder="example@email.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>كلمة المرور</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock icon-right"></i>
                            <input type="password" id="password-input" placeholder="••••••••" required>
                            <i class="far fa-eye icon-left" id="toggle-password"></i>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox">
                            <span>تذكرني</span>
                        </label>
                        <a href="#" class="forgot-password">نسيت كلمة المرور؟</a>
                    </div>

                    <div id="login-error" style="display:none; background: #FEE2E2; color: #991B1B; padding: 10px 16px; border-radius: 12px; font-size: 0.85rem; font-weight: 700; text-align: center; margin-bottom: 12px; width: 100%;"></div>

                    <button type="submit" class="submit-btn" id="login-submit-btn">تسجيل الدخول</button>

                    <div class="divider">
                        <span>
                            أو
                            <br><small style="margin-top: 5px; opacity: 0.7;">تسجيل دخول سريع</small>
                        </span>
                    </div>

                    <div class="social-login">
                        <button type="button" class="social-btn" onclick="alert('خدمة الدخول عبر جوجل ستتوفر قريباً')">
                            <i class="fab fa-google" style="color: #DB4437;"></i>
                        </button>
                        <button type="button" class="social-btn" onclick="alert('خدمة الدخول عبر فيسبوك ستتوفر قريباً')">
                            <i class="fab fa-facebook-f"></i>
                        </button>
                        <button type="button" class="social-btn" onclick="alert('خدمة الدخول عبر آبل ستتوفر قريباً')">
                            <i class="fab fa-apple"></i>
                        </button>
                    </div>
                </form>

                <div class="signup-link">
                    ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a>
                </div>
            </div>
        </div>

        <!-- Right Side: Illustration -->
        <div class="image-side">
            <img src="login_illustration.png" alt="Illustration" class="illustration-img" onerror="this.src='hero_banner.png'">
            
            <div class="features">
                <div class="feature-item">
                    <div class="feature-icon f1"><i class="fas fa-user-shield"></i></div>
                    <h4>مجتمع موثوق</h4>
                    <p>تجربة أفضل</p>
                </div>
                <div class="feature-item">
                    <div class="feature-icon f2"><i class="fas fa-tags"></i></div>
                    <h4>أسعار أقل</h4>
                    <p>توفير أكثر</p>
                </div>
                <div class="feature-item">
                    <div class="feature-icon f3"><i class="fas fa-shield-check"></i></div>
                    <h4>شراء آمن</h4>
                    <p>وحماية تامة</p>
                </div>
            </div>
        </div>

    </div>

    <!-- Supabase + Auth -->
    <script src="mobile.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>

    <script>
        // Dark Mode Logic
        const themeBtn = document.getElementById('theme-toggle-btn');
        const themeIcon = document.getElementById('theme-icon');
        const body = document.body;

        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'dark') {
            body.classList.add('dark-mode');
            themeIcon.classList.remove('fa-moon');
            themeIcon.classList.add('fa-sun');
        }

        themeBtn.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
                localStorage.setItem('theme', 'dark');
            } else {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
                localStorage.setItem('theme', 'light');
            }
        });

        // Password Visibility
        const togglePassword = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password-input');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });



        // If already logged in, redirect to home
        (async function checkExistingSession() {
            const session = await LodeaAuth.getSessionSafe();
            if (session && session.user) {
                window.location.href = 'index.html';
            }
        })();

        // Real Supabase Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-submit-btn');
            const errorDiv = document.getElementById('login-error');
            const emailInput = e.target.querySelector('input[type="email"]');
            const passInput = document.getElementById('password-input');

            const email = emailInput.value.trim();
            const password = passInput.value;

            if (!email || !password) {
                errorDiv.textContent = 'يرجى إدخال البريد الإلكتروني وكلمة المرور';
                errorDiv.style.display = 'block';
                return;
            }

            // Show loading
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الدخول...';
            errorDiv.style.display = 'none';

            try {
                const supabaseClient = LodeaAuth.getSupabaseClient();
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    let msg = 'حدث خطأ أثناء تسجيل الدخول';
                    if (error.message.includes('Invalid login credentials')) {
                        msg = 'البريد الإلكتروني أو كلمة المرور غير صحيحة';
                    } else if (error.message.includes('Email not confirmed')) {
                        msg = 'يرجى تأكيد بريدك الإلكتروني أولاً';
                    } else if (error.message.includes('Too many requests')) {
                        msg = 'محاولات كثيرة جداً، يرجى الانتظار قليلاً';
                    }
                    errorDiv.textContent = msg;
                    errorDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = 'تسجيل الدخول';
                    return;
                }

                if (data.session) {
                    await LodeaAuth.persistAuthSession(data.session);
                    btn.innerHTML = '<i class="fas fa-check"></i> تم الدخول بنجاح!';
                    btn.style.background = '#10B981';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 600);
                }
            } catch (err) {
                console.error('Login error:', err);
                errorDiv.textContent = 'حدث خطأ في الاتصال، يرجى المحاولة لاحقاً';
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = 'تسجيل الدخول';
            }
        });
    </script>
    <!-- ===== MOBILE BOTTOM NAVIGATION ===== -->
    <nav class="mobile-bottom-nav" id="mobile-bottom-nav">
        <a href="index.html" class="nav-item" id="nav-home">
            <i class="fas fa-home nav-icon"></i>
            <span class="nav-label">الرئيسية</span>
        </a>
        <a href="rooms.html" class="nav-item" id="nav-rooms">
            <i class="fas fa-shopping-cart nav-icon"></i>
            <span class="nav-label">غرفي</span>
        </a>
        <a href="community.html" class="nav-item" id="nav-community">
            <i class="fas fa-comments nav-icon"></i>
            <span class="nav-label">المجتمع</span>
        </a>
        <a href="products.html" class="nav-item" id="nav-products">
            <i class="fas fa-shopping-bag nav-icon"></i>
            <span class="nav-label">المنتجات</span>
        </a>
        <a href="favorites.html" class="nav-item" id="nav-favorites">
            <i class="far fa-heart nav-icon"></i>
            <span class="nav-label">المفضلة</span>
        </a>
        <a href="settings.html" class="nav-item" id="nav-settings">
            <i class="far fa-user nav-icon"></i>
            <span class="nav-label">حسابي</span>
        </a>
    </nav>
</body>
</html>
